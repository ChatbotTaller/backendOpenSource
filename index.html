<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Reyes Polo S.A.C.</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #0d0d0d;
            --rojo: #c0392b;
            --rojo-oscuro: #96281b;
            --gris: #1a1a1a;
            --gris-medio: #2a2a2a;
            --gris-claro: #3a3a3a;
            --blanco: #f0ede8;
            --blanco-apagado: #b0ad a8;
            --acento: #e8d5b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--negro);
            color: var(--blanco);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo con textura */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 50%, rgba(192,57,43,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(232,213,176,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(240,237,232,0.08);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--rojo);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-info h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 1.5px;
            color: var(--blanco);
            line-height: 1;
        }

        .header-info p {
            font-size: 11px;
            color: rgba(240,237,232,0.45);
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 8px rgba(39,174,96,0.6);
            animation: pulse-dot 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* MENSAJES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--gris-claro); border-radius: 2px; }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: fadeUp 0.25s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; }

        .msg-bubble {
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            font-weight: 300;
        }

        .msg.bot .msg-bubble {
            background: var(--gris-medio);
            color: var(--blanco);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(240,237,232,0.07);
        }

        .msg.user .msg-bubble {
            background: var(--rojo);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(240,237,232,0.3);
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg.user .msg-time { text-align: right; }

        /* Typing indicator */
        .typing .msg-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: rgba(240,237,232,0.4);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* CHIPS DE SUGERENCIAS */
        .suggestions {
            padding: 0 20px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .chip {
            padding: 7px 13px;
            background: transparent;
            border: 1px solid rgba(240,237,232,0.15);
            border-radius: 20px;
            color: rgba(240,237,232,0.6);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: var(--rojo);
            color: var(--blanco);
            background: rgba(192,57,43,0.1);
        }

        /* INPUT */
        .input-area {
            padding: 14px 20px 20px;
            border-top: 1px solid rgba(240,237,232,0.08);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrap {
            flex: 1;
            background: var(--gris-medio);
            border: 1px solid rgba(240,237,232,0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: rgba(192,57,43,0.5);
        }

        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--blanco);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 300;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
        }

        #msgInput::placeholder { color: rgba(240,237,232,0.3); }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--rojo);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { background: var(--rojo-oscuro); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 18px; height: 18px; fill: white; }

        /* Mensaje de error */
        .error-msg .msg-bubble {
            background: rgba(192,57,43,0.2);
            border-color: rgba(192,57,43,0.3);
            color: #e8a09a;
        }

        /* Bienvenida */
        .welcome {
            text-align: center;
            padding: 30px 20px 10px;
            animation: fadeUp 0.4s ease forwards;
        }

        .welcome-icon { font-size: 36px; margin-bottom: 10px; }

        .welcome h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--blanco);
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 13px;
            color: rgba(240,237,232,0.4);
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto;
        }

        /* BACKEND URL CONFIG - oculto pero configurable */
        .config-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13,13,13,0.95);
            border-top: 1px solid rgba(192,57,43,0.3);
            padding: 10px 20px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 100;
            font-size: 12px;
        }

        .config-bar.visible { display: flex; }
        .config-bar label { color: rgba(240,237,232,0.5); white-space: nowrap; }
        .config-bar input {
            flex: 1;
            background: var(--gris-medio);
            border: 1px solid rgba(240,237,232,0.1);
            border-radius: 6px;
            padding: 5px 10px;
            color: var(--blanco);
            font-size: 12px;
            font-family: monospace;
            outline: none;
        }
        .config-bar button {
            background: var(--rojo);
            border: none;
            border-radius: 6px;
            color: white;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="logo-icon">🔧</div>
        <div class="header-info">
            <h1>Taller Reyes Polo</h1>
            <p>Asistente IA · El Porvenir, La Libertad</p>
        </div>
        <div class="status-dot" title="En línea"></div>
    </div>

    <div class="messages" id="messages">
        <div class="welcome">
            <div class="welcome-icon">🛠️</div>
            <h2>Bienvenido</h2>
            <p>Pregúntame sobre servicios, precios, horarios o repuestos del taller.</p>
        </div>
    </div>

    <div class="suggestions" id="suggestions">
        <button class="chip" onclick="sendChip(this)">¿Qué servicios ofrecen?</button>
        <button class="chip" onclick="sendChip(this)">¿Cuáles son sus horarios?</button>
        <button class="chip" onclick="sendChip(this)">Precio de filtro de aceite</button>
        <button class="chip" onclick="sendChip(this)">¿Dónde están ubicados?</button>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <textarea id="msgInput" rows="1" placeholder="Escribe tu consulta..." 
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<!-- Barra de config oculta - actívala con Ctrl+Shift+C -->
<div class="config-bar" id="configBar">
    <label>Backend URL:</label>
    <input type="text" id="backendUrl" placeholder="https://xxxx.ngrok-free.app/webhook">
    <button onclick="saveUrl()">Guardar</button>
</div>

<script>
    // ===== CONFIGURA TU URL AQUÍ =====
    let BACKEND_URL = localStorage.getItem('backend_url') || 'https://b861-190-216-181-160.ngrok-free.app/webhook';
    document.getElementById('backendUrl').value = BACKEND_URL;
    // ==================================

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    let isLoading = false;

    function getTime() {
        return new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, type) {
        // Ocultar chips después del primer mensaje
        if (type === 'user') {
            document.getElementById('suggestions').style.display = 'none';
        }

        const msg = document.createElement('div');
        msg.className = `msg ${type}`;
        msg.innerHTML = `
            <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
            <span class="msg-time">${getTime()}</span>
        `;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return msg;
    }

    function showTyping() {
        const msg = document.createElement('div');
        msg.className = 'msg bot typing';
        msg.id = 'typing-indicator';
        msg.innerHTML = `
            <div class="msg-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
        const t = document.getElementById('typing-indicator');
        if (t) t.remove();
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text || isLoading) return;

        input.value = '';
        input.style.height = 'auto';
        isLoading = true;
        sendBtn.disabled = true;

        addMessage(text, 'user');
        showTyping();

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_message: text })
            });

            if (!response.ok) throw new Error(`Error ${response.status}`);

            const data = await response.json();
            hideTyping();
            addMessage(data.reply || 'Sin respuesta del servidor.', 'bot');

        } catch (err) {
            hideTyping();
            const errorMsg = err.message.includes('Failed to fetch')
                ? '⚠️ No puedo conectarme al servidor. Verifica que ngrok y Node.js estén activos.'
                : `⚠️ Error: ${err.message}`;
            const errDiv = addMessage(errorMsg, 'bot');
            errDiv.classList.add('error-msg');
            console.error('Error:', err);
        }

        isLoading = false;
        sendBtn.disabled = false;
        input.focus();
    }

    function sendChip(btn) {
        input.value = btn.textContent;
        sendMessage();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    // Ctrl+Shift+C para cambiar la URL del backend
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'C') {
            document.getElementById('configBar').classList.toggle('visible');
        }
    });

    function saveUrl() {
        const url = document.getElementById('backendUrl').value.trim();
        if (url) {
            BACKEND_URL = url;
            localStorage.setItem('backend_url', url);
            document.getElementById('configBar').classList.remove('visible');
            addMessage('✅ URL del backend actualizada.', 'bot');
        }
    }
</script>

</body>
</html>
